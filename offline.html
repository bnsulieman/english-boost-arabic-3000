<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#5b28ef">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="English Boost">
  <link rel="manifest" href="./manifest.webmanifest">
  <title>تجهيز English Boost</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;
      background:#f7f7ff;color:#17133d;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
    main{text-align:center;max-width:420px}
    .mark{width:58px;height:58px;margin:auto;border:5px solid #ddd7ff;
      border-top-color:#5b28ef;border-radius:50%;animation:spin .8s linear infinite}
    h1{font-size:21px;margin:18px 0 8px}
    p{font-size:15px;line-height:1.7;color:#625c80}
    @keyframes spin{to{transform:rotate(1turn)}}
  </style>
</head>
<body>
  <main>
    <div class="mark"></div>
    <h1>جارٍ تجهيز التطبيق للعمل بدون إنترنت…</h1>
    <p id="status">ابقَ متصلًا بالإنترنت لبضع ثوانٍ في أول مرة فقط.</p>
  </main>
  <script>
    const statusText = document.getElementById("status");

    async function prepareOffline() {
      if (!("serviceWorker" in navigator)) {
        statusText.textContent = "هذا المتصفح لا يدعم التشغيل بدون إنترنت.";
        return;
      }

      try {
        await navigator.serviceWorker.register("./sw.js", { scope: "./" });
        await navigator.serviceWorker.ready;

        const cache = await caches.open("english-boost-offline-v1");
        await cache.addAll(["./", "./index.html", "./manifest.webmanifest"]);

        statusText.textContent = "تم التجهيز. جارٍ فتح التطبيق…";
        setTimeout(() => location.replace("./#home"), 700);
      } catch (error) {
        statusText.textContent = "تعذّر التجهيز الآن. حدّث الصفحة وأعد المحاولة وأنت متصل بالإنترنت.";
        console.error(error);
      }
    }

    prepareOffline();
  </script>
</body>
</html>
